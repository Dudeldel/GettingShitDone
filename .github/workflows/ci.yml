name: CI

# Quality gates. Deploy is handled by Railway's native GitHub integration
# (auto-build on push to main), so there is no deploy job here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Pint (format check)
        run: ./vendor/bin/pint --test

      # Pest + Larastan (level 6) slot in here once installed (see tests/CLAUDE.md).
      - name: Tests (SQLite in-memory)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build
