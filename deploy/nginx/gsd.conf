# GSD walking-skeleton — nginx server block.
# Install:
#   sudo cp deploy/nginx/gsd.conf /etc/nginx/sites-available/gsd.conf
#   sudo ln -s /etc/nginx/sites-available/gsd.conf /etc/nginx/sites-enabled/gsd.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d <subdomain>     # injects the TLS listener + redirect
#
# Replace <subdomain> and the root path before installing.

server {
    listen 80;
    listen [::]:80;
    server_name <subdomain>;

    # Built React SPA (output of `npm run build` in frontend/)
    root /var/www/gsd/frontend/dist;
    index index.html;

    # Laravel REST API via Octane (Swoole) bound to localhost only.
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block dotfiles (but allow ACME challenge).
    location ~ /\.(?!well-known) {
        deny all;
    }
}
